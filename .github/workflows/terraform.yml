name: Terraform CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to run'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy

env:
  AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION:    us-east-2

jobs:
  # -------------------------------------------
  # PLAN - runs on every Pull Request
  # Posts the plan output as a PR comment
  # -------------------------------------------
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.0

      - name: Generate tfvars
        run: |
          cat > terraform.tfvars <<EOF
          region               = "us-east-2"
          environment          = "dev"
          project_name         = "devops-project"
          state_bucket_name    = "devops-project-state-us-east-2"
          dynamodb_table_name  = "devops-project-terraform-lock"
          vpc_cidr             = "10.0.0.0/16"
          public_subnet_cidrs  = ["10.0.1.0/24", "10.0.2.0/24"]
          private_subnet_cidrs = ["10.0.3.0/24", "10.0.4.0/24"]
          availability_zones   = ["us-east-2a", "us-east-2b"]
          ami_id               = "ami-04a8291398335a9ac"
          instance_type        = "t3.micro"
          asg_min_size         = 1
          asg_max_size         = 3
          asg_desired_capacity = 2
          db_name              = "employeedb"
          db_username          = "admin"
          db_password          = "${{ secrets.TF_VAR_DB_PASSWORD }}"
          db_instance_class    = "db.t3.micro"
          EOF

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -var-file="terraform.tfvars" 2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Post Plan as PR Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('plan_output.txt', 'utf8').slice(0, 60000);
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Terraform Plan\n\`\`\`\n${plan}\n\`\`\``
            })

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

  # -------------------------------------------
  # APPLY - runs on every push to main
  # -------------------------------------------
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.0

      - name: Generate tfvars
        run: |
          cat > terraform.tfvars <<EOF
          region               = "us-east-2"
          environment          = "dev"
          project_name         = "devops-project"
          state_bucket_name    = "devops-project-state-us-east-2"
          dynamodb_table_name  = "devops-project-terraform-lock"
          vpc_cidr             = "10.0.0.0/16"
          public_subnet_cidrs  = ["10.0.1.0/24", "10.0.2.0/24"]
          private_subnet_cidrs = ["10.0.3.0/24", "10.0.4.0/24"]
          availability_zones   = ["us-east-2a", "us-east-2b"]
          ami_id               = "ami-04a8291398335a9ac"
          instance_type        = "t3.micro"
          asg_min_size         = 1
          asg_max_size         = 3
          asg_desired_capacity = 2
          db_name              = "employeedb"
          db_username          = "admin"
          db_password          = "${{ secrets.TF_VAR_DB_PASSWORD }}"
          db_instance_class    = "db.t3.micro"
          EOF

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Apply
        run: terraform apply -auto-approve -var-file="terraform.tfvars"

      - name: Show Outputs
        run: terraform output

  # -------------------------------------------
  # MANUAL - triggered from GitHub Actions UI
  # -------------------------------------------
  manual:
    name: Terraform Manual
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.0

      - name: Generate tfvars
        run: |
          cat > terraform.tfvars <<EOF
          region               = "us-east-2"
          environment          = "dev"
          project_name         = "devops-project"
          state_bucket_name    = "devops-project-state-us-east-2"
          dynamodb_table_name  = "devops-project-terraform-lock"
          vpc_cidr             = "10.0.0.0/16"
          public_subnet_cidrs  = ["10.0.1.0/24", "10.0.2.0/24"]
          private_subnet_cidrs = ["10.0.3.0/24", "10.0.4.0/24"]
          availability_zones   = ["us-east-2a", "us-east-2b"]
          ami_id               = "ami-04a8291398335a9ac"
          instance_type        = "t3.micro"
          asg_min_size         = 1
          asg_max_size         = 3
          asg_desired_capacity = 2
          db_name              = "employeedb"
          db_username          = "admin"
          db_password          = "${{ secrets.TF_VAR_DB_PASSWORD }}"
          db_instance_class    = "db.t3.micro"
          EOF

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        if: github.event.inputs.action == 'plan'
        run: terraform plan -var-file="terraform.tfvars"

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        run: terraform apply -auto-approve -var-file="terraform.tfvars"

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -auto-approve -var-file="terraform.tfvars"
